name: DAO Platform CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: Install dependencies
        run: |
          cd contracts
          npm install
      - name: Compile contracts
        run: |
          cd contracts
          npx hardhat compile
      - name: Run test suite
        run: |
          cd contracts
          npx hardhat test

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: Install dependencies
        run: |
          cd backend
          npm install
      - name: Generate Prisma Client
        run: |
          cd backend
          npx prisma generate
      - name: Compile NestJS
        run: |
          cd backend
          npm run build

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: Install dependencies
        run: |
          cd frontend
          npm install --legacy-peer-deps
      - name: Compile Next.js
        run: |
          cd frontend
          npm run build
